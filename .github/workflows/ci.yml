name: ci

on:
  push:
    branches: [master, lite]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler:
          - { cc: gcc, cxx: g++ }
          - { cc: clang, cxx: clang++ }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: build
        run: make
      - name: full gate (unit + sanitizers + bounded differential fuzz)
        run: ./scripts/check.sh

  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: format + hygiene check
        run: ./scripts/check-format.sh

  deep-fuzz:
    strategy:
      fail-fast: false
      matrix:
        opt: ["-O0", "-O1", "-O2", "-O3"]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: build
        run: make
      - name: differential fuzz soak at ${{ matrix.opt }}
        run: FUZZ_OPT="${{ matrix.opt }}" FUZZ_ROUNDS=100 ./scripts/check-fuzz.sh
